<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>ログイン認証</title>
    <style>
            /* 全体のリセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        /* 画面中央にボックスを配置する簡単なデザイン */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>認証が必要です</h2>
    
    <div class="input-group">
        <label>合言葉1：</label>
        <input type="password" id="pass1" placeholder="1つ目のパスワード">
    </div>
    <div class="input-group">
        <label>合言葉2：</label>
        <input type="password" id="pass2" placeholder="2つ目のパスワード">
    </div>
    <div class="input-group">
        <label>合言葉3：</label>
        <input type="password" id="pass3" placeholder="3つ目のパスワード">
    </div>

    <button onclick="checkPasswords()">認証する</button>
</div>

<script>
    function checkPasswords() {
        // 正解のパスワードをそれぞれ設定
        const correct1 = "apple";
        const correct2 = "banana";
        const correct3 = "cherry";

        // 画面のボックスから入力された値を取得
        const input1 = document.getElementById("pass1").value;
        const input2 = document.getElementById("pass2").value;
        const input3 = document.getElementById("pass3").value;

        // 【かつ（&&）】を使って、すべてが一致しているか判定
        if (input1 === correct1 && input2 === correct2 && input3 === correct3) {
            alert("認証に成功しました！秘密のページへ移動します。");
            
            // 全て通ったら、本当に行きたいページ（例: secret.html）に飛ばす
            window.location.href = "main.html"; 
        } else {
            // 1つでも間違っていた場合
            alert("パスワードが違います。もう一度確認してください。");
        }
    }
</script>

</body>
</html>
